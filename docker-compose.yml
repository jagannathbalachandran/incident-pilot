# docker-compose.yml
#
# Orchestrates the real-time incident monitoring stack:
#   - flask-generator  : tick-driven incident simulator / Prometheus target
#   - prometheus       : time-series metrics store (scrapes flask-generator)
#   - loki             : log aggregation (ingests flask-generator stdout)
#   - grafana          : visualisation (pre-provisioned datasources + dashboards)

services:
  # --------------------------------------------------------------------------
  # Flask Generator
  # --------------------------------------------------------------------------
  flask-generator:
    build:
      context: ./flask-generator
      dockerfile: Dockerfile
    container_name: flask-generator
    ports:
      - "5001:5000"
    environment:
      - TICK_MODE=${TICK_MODE:-accelerated}
      - TICK_INTERVAL=${TICK_INTERVAL:-}
      - JOURNEYS_PER_TICK=${JOURNEYS_PER_TICK:-}
      - HOST=0.0.0.0
      - PORT=5000
    # No Loki logging driver here: the generator now simulates several
    # services in one process, so a single static `service=checkout-api`
    # external label would mislabel every line. traffic.py already pushes
    # each log line to Loki directly via HTTP with its own correct
    # per-service stream label -- this container just uses Docker's
    # default logging driver for `docker logs` visibility.
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --------------------------------------------------------------------------
  # Prometheus
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - monitoring
    depends_on:
      flask-generator:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------------------------
  # Loki
  # --------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------------------------
  # Grafana
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------------------------
  # IncidentPilot — AI Incident-Response Copilot (Gradio UI + Agent)
  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
  # IncidentPilot — AI Incident-Response Copilot (Gradio UI + Agent)
  # --------------------------------------------------------------------------
  incident-pilot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: incident-pilot
    ports:
      - "7860:7860"
    environment:
      # Point to flask-generator's/prometheus's/loki's internal Docker hostnames --
      # query_logs.py defaults to localhost, which inside this container means
      # itself, not the sibling containers on the `monitoring` network.
      - FLASK_API_URL=http://flask-generator:5000
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      - TOKENIZERS_PARALLELISM=false
      # Required for LLM features — set GROQ_API_KEY in .env or shell env
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      # Groq model — each model has its own per-day token budget, so switch
      # here (e.g. llama-3.3-70b-versatile) when one model's quota is spent.
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
    volumes:
      # Mount the vector store from host so it persists across container restarts
      # Run 'uv run python src/ingestion.py' first if directory is empty
      - ./synthetic-data/vectorstore:/app/synthetic-data/vectorstore
    networks:
      - monitoring
    depends_on:
      flask-generator:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# --------------------------------------------------------------------------
# Networks & Volumes
# --------------------------------------------------------------------------
networks:
  monitoring:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
