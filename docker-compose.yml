# docker-compose.yml
#
# Orchestrates the real-time incident monitoring stack:
#   - flask-generator  : tick-driven incident simulator / Prometheus target
#   - prometheus       : time-series metrics store (scrapes flask-generator)
#   - loki             : log aggregation (ingests flask-generator stdout)
#   - grafana          : visualisation (pre-provisioned datasources + dashboards)

services:
  # --------------------------------------------------------------------------
  # Flask Generator
  # --------------------------------------------------------------------------
  flask-generator:
    build:
      context: ./flask-generator
      dockerfile: Dockerfile
    container_name: flask-generator
    ports:
      - "5001:5000"
    environment:
      - TICK_MODE=${TICK_MODE:-accelerated}
      - TICK_INTERVAL=${TICK_INTERVAL:-}
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
        loki-retries: "3"
        loki-max-backoff: "1s"
        loki-external-labels: "service=checkout-api,source=flask-generator"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --------------------------------------------------------------------------
  # Prometheus
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - monitoring
    depends_on:
      flask-generator:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------------------------
  # Loki
  # --------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------------------------
  # Grafana
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

# --------------------------------------------------------------------------
# Networks & Volumes
# --------------------------------------------------------------------------
networks:
  monitoring:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
