# grafana/provisioning/dashboards/dashboard.yml
apiVersion: 1

providers:
  - name: "Incident Dashboards"
    orgId: 1
    folder: "Incidents"
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
